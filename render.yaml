databases:
  - name: moodtunes-db
    plan: free
    databaseName: moodtunes
    user: moodtunes_user

services:
  - type: web
    name: moodtunes-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: MODEL_PATH
        value: ml/weights/emotion_cnn.pth
      - key: ALLOWED_ORIGINS
        value: '["https://bhanvadiyaneel31-netizen.github.io","http://localhost:3000"]'
      - key: DATABASE_URL
        fromDatabase:
          name: moodtunes-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: DEBUG
        value: "false"
